default_toolset: basic_tools

settings:
  data_root: ../data

toolsets:
  basic_tools:
    - calculator
    - file_reader
    - local_file_search
    - table_analyzer
    - format_converter
  extended_tools:
    - calculator
    - file_reader
    - local_file_search
    - table_analyzer
    - format_converter
    - document_reader
    - read_then_convert
    - python_sandbox
    - python_unit_test_sandbox
    - web_search

tools:
  calculator:
    module: skills.calculator
    function: calculator
    description: Calculate a safe arithmetic expression.
    parameters:
      expression:
        type: string
        description: Arithmetic expression using numbers and supported operators.
    required: [expression]
    returns:
      result:
        type: number
        description: Calculated value.

  file_reader:
    module: skills.file_reader
    function: file_reader
    description: Read a local UTF-8 txt or md file from the data directory.
    parameters:
      path:
        type: string
        description: Path relative to the configured data root.
      max_chars:
        type: integer
        description: Maximum number of characters to return.
    required: [path]
    returns:
      content: {type: string, description: File content.}
      num_chars: {type: integer, description: Returned character count.}
      source: {type: string, description: Normalized path relative to data root.}
      truncated: {type: boolean, description: Whether content was truncated.}

  local_file_search:
    module: skills.local_file_search
    function: local_file_search
    description: Search local txt and md files for query terms.
    parameters:
      query: {type: string, description: Search query.}
      root_dir: {type: string, description: Directory relative to data root.}
      file_types:
        type: array
        items: {type: string}
        description: File extensions to search.
      top_k: {type: integer, description: Maximum number of matches.}
    required: [query]
    returns:
      query_terms: {type: array, description: "Normalized query terms used for ranking."}
      results: {type: array, description: "Ranked paths, snippets, and scores."}

  table_analyzer:
    module: skills.table_analyzer
    function: table_analyzer
    description: Analyze a local CSV or TSV file.
    parameters:
      path: {type: string, description: Table path relative to data root.}
      max_rows_preview: {type: integer, description: Number of preview rows.}
      describe: {type: boolean, description: Whether to calculate numeric statistics.}
    required: [path]
    returns:
      num_rows: {type: integer, description: Data row count.}
      num_columns: {type: integer, description: Column count.}
      columns: {type: array, description: Column names.}
      preview: {type: array, description: First rows.}
      describe: {type: object, description: Numeric statistics by column.}

  format_converter:
    module: skills.format_converter
    function: format_converter
    description: Convert text to markdown bullets or formatted JSON and write the converted content to a file.
    parameters:
      text: {type: string, description: Input text.}
      target_format: {type: string, description: markdown or json.}
      output_filename: {type: string, description: Optional output filename. Defaults to converted.md or converted.json.}
    required: [text, target_format]
    returns:
      formatted_text: {type: string, description: Converted text.}
      generated_file_path: {type: string, description: Path of the generated output file.}

  document_reader:
    module: skills.document_reader
    function: document_reader
    description: Read text from a local PDF, DOCX, or PPTX document under the configured data root.
    parameters:
      path:
        type: string
        description: PDF, DOCX, or PPTX path relative to the configured data root.
      max_chars:
        type: integer
        description: Maximum number of extracted characters to return.
    required: [path]
    returns:
      content: {type: string, description: Extracted document text.}
      num_chars: {type: integer, description: Returned character count.}
      source: {type: string, description: Normalized path relative to data root.}
      file_type: {type: string, description: Document file type, such as pdf, docx, or pptx.}
      truncated: {type: boolean, description: Whether extracted text was truncated.}
      metadata: {type: object, description: Basic document metadata such as page, paragraph, or slide count.}
      warnings: {type: array, description: Non-fatal extraction warnings.}

  read_then_convert:
    module: skills.read_then_convert
    function: read_then_convert
    description: Read a local txt or md file, convert the content to markdown or JSON, and write the converted file.
    parameters:
      path: {type: string, description: Path relative to the configured data root.}
      target_format: {type: string, description: markdown or json.}
      max_chars: {type: integer, description: Maximum number of file characters to read before conversion.}
      output_filename: {type: string, description: Optional output filename.}
    required: [path, target_format]
    returns:
      source: {type: string, description: Source file path relative to data root.}
      num_chars: {type: integer, description: Number of source characters converted.}
      truncated: {type: boolean, description: Whether source content was truncated before conversion.}
      target_format: {type: string, description: Conversion target format.}
      formatted_text: {type: string, description: Converted text.}
      generated_file_path: {type: string, description: Path of the generated output file.}

  python_sandbox:
    module: skills.python_sandbox
    function: python_sandbox
    description: Execute a short restricted Python snippet with AST checks, timeout, and output limits.
    parameters:
      code: {type: string, description: Short Python code snippet. Imports and file access are blocked.}
      timeout_seconds: {type: number, description: Execution timeout, max 5 seconds.}
      max_output_chars: {type: integer, description: Maximum stdout/stderr characters to return.}
    required: [code]
    returns:
      status: {type: string, description: success if the snippet completed without exception.}
      stdout: {type: string, description: Captured standard output.}
      stderr: {type: string, description: Captured standard error or traceback summary.}
      returncode: {type: integer, description: Sandbox runner process return code.}
      timed_out: {type: boolean, description: Whether execution timed out.}
      truncated: {type: boolean, description: Whether stdout or stderr was truncated.}
      workdir: {type: string, description: Temporary working directory used by the sandbox.}

  python_unit_test_sandbox:
    module: skills.python_unit_test_sandbox
    function: python_unit_test_sandbox
    description: Run restricted Python code with expression-based unit tests and return pass/fail case details.
    parameters:
      code: {type: string, description: Python code under test. Imports and file access are blocked.}
      tests:
        type: array
        items: {type: object}
        description: Test cases with expression and expected fields.
      timeout_seconds: {type: number, description: Execution timeout, max 5 seconds.}
      max_output_chars: {type: integer, description: Maximum stdout/stderr characters to return.}
    required: [code, tests]
    returns:
      status: {type: string, description: completed if code and tests ran inside the sandbox.}
      passed_count: {type: integer, description: Number of passed test cases.}
      failed_count: {type: integer, description: Number of failed test cases.}
      all_passed: {type: boolean, description: Whether all test cases passed.}
      cases: {type: array, description: Per-case expression, expected value, actual value, pass flag, and error.}
      stdout: {type: string, description: Captured standard output.}
      stderr: {type: string, description: Captured standard error or traceback summary.}
      returncode: {type: integer, description: Sandbox runner process return code.}
      timed_out: {type: boolean, description: Whether execution timed out.}
      truncated: {type: boolean, description: Whether stdout or stderr was truncated.}
      workdir: {type: string, description: Temporary working directory used by the sandbox.}

  web_search:
    module: skills.web_search
    function: web_search
    description: Search the web through an isolated subprocess request and return ranked result snippets.
    parameters:
      query: {type: string, description: Search query.}
      top_k: {type: integer, description: Maximum number of search results to return.}
      timeout_seconds: {type: number, description: HTTP request timeout in seconds.}
      mock_results:
        type: array
        items: {type: object}
        description: Optional deterministic results for offline tests and demos.
    required: [query]
    returns:
      query: {type: string, description: Original search query.}
      source: {type: string, description: Search provider or mock.}
      request_mode: {type: string, description: mock or subprocess request mode.}
      results: {type: array, description: Ranked titles, URLs, and snippets.}
