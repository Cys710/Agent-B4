memory:
  root_dir: ../memory
  global_memory_dir: global
  conversation_memory_dir: conversations
  index_path: memory_index.json
  max_memory_chars: 2000
  vector_retrieval:
    backend: fastembed
    model_name_or_path: BAAI/bge-small-zh-v1.5
    device: cpu
    normalize_embeddings: true
    local_files_only: true
    hf_endpoint: https://hf-mirror.com
    batch_size: 16
    threads: 2
    cache_dir: ../models/embedding_models/fast-bge-small-zh-v1.5

  update:
    enabled: true
    strategy: keyword
    top_k: 3
    min_keyword_score: 8
    min_vector_similarity: 0.66
    same_conversation_always_update: true
    include_global_candidates: false
    conflict_policy: prefer_new
    max_added_lines: 18
    min_topic_overlap: 2
  compression:
    enabled: true
    method: llm
    max_doc_chars: 1600
    max_answer_chars: 600
    max_messages: 8
    max_message_chars: 260
    max_trace_chars: 600
    llm:
      enabled: true
      model_config: ../configs/model.yaml
      max_input_chars: 6000
      max_new_tokens: 1024
      fallback_to_rule: false
